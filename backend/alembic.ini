# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default coco case format is used.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, prefixed by ',' or ';' or newlines.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to include in the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be written
# in query/manifest formats
# version_locations =

# version path separator; defaults to os.pathsep
# version_path_separator = :

# set to 'true' to search for newer versions in the version_locations
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://nexusiq_user:nexusiq_password@localhost:5432/nexusiq_db


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
