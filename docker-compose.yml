version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nexusiq-db
    restart: always
    environment:
      POSTGRES_USER: nexusiq_user
      POSTGRES_PASSWORD: nexusiq_password
      POSTGRES_DB: nexusiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusiq_user -d nexusiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusiq-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusiq-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexusiq_user:nexusiq_password@db:5432/nexusiq_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey_replace_in_production
      - GEMINI_API_KEY=mock_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusiq-worker
    restart: always
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexusiq_user:nexusiq_password@db:5432/nexusiq_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey_replace_in_production
      - GEMINI_API_KEY=mock_key
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusiq-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
